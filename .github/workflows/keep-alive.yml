name: Keep MendNotes Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'  # noon UTC every 3 days
  workflow_dispatch:  # allow manual trigger to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            https://vnlgjdmxvlparkfgcqpu.supabase.co/rest/v1/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "Server error — Supabase may be down"
            exit 1
          fi
          echo "Ping successful (2xx or 4xx both count as activity)"
